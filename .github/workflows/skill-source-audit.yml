name: Skill source audit

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Record public source versions
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python3 scripts/audit_upstreams.py

      - name: Stop when no source changed
        id: changed
        run: |
          if git diff --quiet -- upstream-lock.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create a review pull request
        if: steps.changed.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch="automation/skill-source-audit-${{ github.run_id }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add upstream-lock.json
          git commit -m "chore: audit skill source versions"
          git push origin "$branch"
          gh pr create \
            --base main \
            --head "$branch" \
            --title "chore: review updated Skill sources" \
            --body "Automated source audit detected changed commits or Skill files. Review the updated lock before integrating any upstream behavior."
